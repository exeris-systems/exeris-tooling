name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: mvn verify (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['26']

    steps:
      - name: Checkout exeris-tooling
        uses: actions/checkout@v4
        with:
          path: exeris-tooling

      - name: Checkout exeris-sdk (SNAPSHOT dep — installed locally before self-build)
        uses: actions/checkout@v4
        with:
          repository: exeris-systems/exeris-sdk
          ref: main
          path: exeris-sdk

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Install exeris-sdk to local Maven repo
        working-directory: exeris-sdk
        run: mvn -B -ntp -DskipTests install

      - name: mvn -B verify (exeris-tooling)
        working-directory: exeris-tooling
        run: mvn -B -ntp verify
