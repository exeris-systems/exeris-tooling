name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: mvn verify (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['26']

    steps:
      - name: Checkout exeris-tooling
        uses: actions/checkout@v4
        with:
          path: exeris-tooling

      # CI builds the SDK from source and `mvn install`s it (NOT GitHub Packages),
      # so this ref decides which SDK version lands in the local repo. The BOM
      # pins exeris.sdk.version=0.8.0 (released), so we check out the matching
      # v0.8.0 tag — the release gate the previous "track main" comment named
      # ("re-pin to the v0.8.0 tag and drop the BOM SNAPSHOT before cutting
      # tooling 0.6.0") is hereby executed. SDK main has moved on to
      # 0.9.0-SNAPSHOT and would no longer satisfy the BOM pin.
      - name: Checkout exeris-sdk (v0.8.0 tag — matches the released BOM pin)
        uses: actions/checkout@v4
        with:
          repository: exeris-systems/exeris-sdk
          ref: v0.8.0
          path: exeris-sdk

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
          server-id: github-exeris-kernel
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Install exeris-sdk to local Maven repo
        working-directory: exeris-sdk
        run: mvn -B -ntp -DskipTests install

      - name: mvn -B verify (exeris-tooling)
        working-directory: exeris-tooling
        # No -U: both eu.exeris deps are release-pinned (kernel 0.10.0 from
        # GitHub Packages, SDK 0.8.0 built from the v0.8.0 tag above) and
        # releases are immutable, so forced re-resolution buys nothing. -U was
        # only ever here to keep the then-SNAPSHOT kernel-spi fresh against
        # setup-java's `cache: maven`; re-add it if a SNAPSHOT dep ever returns.
        run: mvn -B -ntp verify
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # exeris-codegen-ts is the TypeScript / Angular emitter sibling of
  # exeris-codegen-java. It is NOT a Maven module — vitest drives its
  # tests + coverage. Lives in a parallel job so the JVM matrix and
  # Node matrix can evolve independently. The gating jobs ("mvn verify (JDK 26)",
  # "vitest run --coverage (exeris-codegen-ts)", and "ng build (generated sample
  # app)") are in the required-status-checks list on branch protection for main.
  ts-coverage:
    name: vitest run --coverage (exeris-codegen-ts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exeris-tooling
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: exeris-codegen-ts/package-lock.json

      - name: npm ci (exeris-codegen-ts)
        working-directory: exeris-codegen-ts
        run: npm ci

      - name: vitest run --coverage (exeris-codegen-ts)
        working-directory: exeris-codegen-ts
        run: npm run test:coverage

      # T20 FE build gate (fast, Angular-free): generate a sample app and type-check
      # its data layer (enums + types + Zod schemas — the files that import only
      # `zod`). Catches the enum/schema cross-reference breakage cheaply on every run.
      # The full component/template build is the separate fe-app-build job below.
      - name: verify generated frontend (tsc --noEmit, data layer)
        working-directory: exeris-codegen-ts
        run: npm run verify:generated

  # Full FE build gate: generate a complete sample app and `ng build` it — the catch
  # for component/service/template breakage (the layer that needs @angular/*), the FE
  # analog of KernelCodegenCompileTest. Heavier (installs Angular), so a separate job.
  fe-app-build:
    name: ng build (generated sample app)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exeris-tooling
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: exeris-codegen-ts/package-lock.json

      - name: npm ci + build (exeris-codegen-ts)
        working-directory: exeris-codegen-ts
        run: |
          npm ci
          npm run build

      - name: Generate sample Angular app
        working-directory: exeris-codegen-ts
        run: node scripts/gen-sample-app.mjs "$RUNNER_TEMP/fe-sample"

      # @exeris-systems/ui-kit is published to GitHub Packages. The generated app emits
      # the scoped registry in its .npmrc; append the read token (the workflow's
      # GITHUB_TOKEN has packages:read; the SDK repo + package are public) so the
      # sample installs ui-kit exactly as a real consumer does — validating the
      # published tarball, not a local source checkout.
      - name: npm install + ng build (generated app)
        working-directory: ${{ runner.temp }}/fe-sample
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          npm install --no-audit --no-fund
          npx ng build --configuration development
