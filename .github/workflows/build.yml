name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: mvn verify (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['26']

    steps:
      - name: Checkout exeris-tooling
        uses: actions/checkout@v4
        with:
          path: exeris-tooling

      - name: Checkout exeris-sdk (pinned to released v0.7.0 — provides ActionMetadata.methodName for T1)
        uses: actions/checkout@v4
        with:
          repository: exeris-systems/exeris-sdk
          ref: v0.7.0
          path: exeris-sdk

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
          server-id: github-exeris-kernel
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Install exeris-sdk to local Maven repo
        working-directory: exeris-sdk
        run: mvn -B -ntp -DskipTests install

      - name: mvn -B verify (exeris-tooling)
        working-directory: exeris-tooling
        run: mvn -B -ntp verify
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # exeris-codegen-ts is the TypeScript / Angular emitter sibling of
  # exeris-codegen-java. It is NOT a Maven module — vitest drives its
  # tests + coverage. Lives in a parallel job so the JVM matrix and
  # Node matrix can evolve independently. Both jobs ("mvn verify (JDK 26)"
  # and "vitest run --coverage (exeris-codegen-ts)") are in the
  # required-status-checks list on branch protection for main.
  ts-coverage:
    name: vitest run --coverage (exeris-codegen-ts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exeris-tooling
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: exeris-codegen-ts/package-lock.json

      - name: npm ci (exeris-codegen-ts)
        working-directory: exeris-codegen-ts
        run: npm ci

      - name: vitest run --coverage (exeris-codegen-ts)
        working-directory: exeris-codegen-ts
        run: npm run test:coverage

      # T20 FE build gate: generate a sample app and type-check its data layer
      # (enums + types + Zod schemas — the files that import only `zod`). Catches the
      # enum/schema cross-reference breakage that "the generated frontend doesn't
      # compile" means, without an Angular install. The full `ng build` over a
      # generated app (components/services need @angular/*) is a heavier follow-up job.
      - name: verify generated frontend (tsc --noEmit, data layer)
        working-directory: exeris-codegen-ts
        run: npm run verify:generated
